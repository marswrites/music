<!DOCTYPE html>

<meta charset="UTF-8">
<title>Marswrites Playlist Directory</title>

<link rel="stylesheet" href="style.css?v=2"> 

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background: #fae6e7; /*Background color in hex code*/
}

.sidebar {
  width: 380px; /*Do not dare change this*/
  padding: 20px;
  background: #ffb6c3;
  box-sizing: border-box;
  height: 100vh;
  overflow-y: auto; /*This is so you can scroll up and down*/
  position: sticky;
  top: 0; /*This is so the bottom isn't a different color*/
}

.sidebar h3 {
  margin-top: 14px;
  margin-bottom: 8px;
  font-size: 13px; /*Font size of data types*/
}

.sidebar label {
  display: block;
  font-size: 11px; /*Font size of data ("Zendaya")*/
  margin-bottom: 4px;
  cursor: pointer;
}

.grid {
  display: grid;
  padding: 40px;
  grid-template-columns: repeat(7, 1fr); /*Do not change this, even if it looks like you can*/
  grid-template-rows: repeat(3, 1fr); /*Do not change this, otherwise you'll get a huge gap between rows*/
  row-gap: 20px;
  column-gap: 12px; /*These two gaps don't really work, if I'm honest*/
  justify-content: start;
}

/* Song card */
  
   .song {
  width: 100%;
  display: block;
  text-align: center;
  font-size: 10px;
}

 .song img {
  width: 100%;    /* fill the column fully */
  max-width: 120px; /* optional: max size */
  height: 120px;    /* fixed standard square*/
  object-fit: cover;
}

.song div {
  height: auto;
  overflow: hidden;
  
}   

@media (max-width: 1200px) {
  .grid {
    grid-template-columns: repeat(5, 1fr); /*This is the organization of the screen in other devices that have a different width, so tablet or mobile*/
  }
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

<div class="grid" id="songGrid"></div>

<script>

fetch("songs.json")
.then(res => res.json())
.then(data => {

const container = document.getElementById("songGrid");
const sortSelect = document.getElementById("sortSongs");

data.forEach(song => {

const div = document.createElement("div");
div.className = "song";

div.dataset.addition = song.addition;
div.dataset.year = song.year;
div.dataset.release = song.release;
div.dataset.artist = song.artist;
div.dataset.album = song.album;
div.dataset.language = song.language;
div.dataset.extra = song.extra;
div.dataset.decade = song.decade;

div.innerHTML = `
<img src="${song.img}" loading="lazy">
<p>
${song.title}<br>
${song.artistname}<br>
${song.year} · ${song.albumname}
</p>
`;

container.appendChild(div);

});

const songs = Array.from(document.querySelectorAll(".song"));
const originalOrder = [...songs];

const filters = document.querySelectorAll(".filter");

filters.forEach(filter => {
filter.addEventListener("change", () => {

const active = {
decade: [],
extra: [],
language: [],
artist: [],
album: []
};

filters.forEach(f => {
if (f.checked) {
active[f.dataset.type].push(f.value.toLowerCase());
}
});

songs.forEach(song => {

let show = true;

for (let type in active) {

if (active[type].length > 0) {

const values = (song.dataset[type] || "")
.toString()
.split(",")
.map(v => v.trim().toLowerCase());

if (!values.some(v => active[type].includes(v))) {
show = false;
break;
}

}

}

song.style.display = show ? "block" : "none";

});

});
});


sortSelect.addEventListener("change", () => {

const method = sortSelect.value;
let sortedSongs;

if (method === "default") {
sortedSongs = originalOrder;
}

else if (method === "addition") {

sortedSongs = [...originalOrder].sort(
(a,b)=>(Number(a.dataset.addition)||999999)-(Number(b.dataset.addition)||999999)
);

}

else if (method === "release") {

sortedSongs = [...originalOrder].sort(
(a,b)=>(Number(a.dataset.release)||999999)-(Number(b.dataset.release)||999999)
);

}

sortedSongs.forEach(song => container.appendChild(song));

});

})
.catch(err => {
console.error("Failed to load songs.json", err);
});

</script>
